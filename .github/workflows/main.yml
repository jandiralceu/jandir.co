name: site_blog_main_ci_cd

on:
  push:
    branches:
      - main

jobs:
  lint_and_testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: ⌛️ Installing dependencies
        run: yarn

      - name: 👀 Linting
        run: yarn lint

      - name: 🌡 Testing
        run: yarn test:ci

  build:
    runs-on: ubuntu-latest
    needs: lint_and_testing
    environment:
      name: "production"

    steps:
      - uses: actions/checkout@v2
      - name: ⌛️ Installing dependencies
        run: yarn

      - name: 🏗 Building
        run: yarn build

      - name: 🚀 Uploading artifacts
        uses: actions/upload-artifact@v2
        with:
          name: public
          path: public
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "production"

    steps:
      - uses: actions/checkout@v2
      - name: 🔓 ACTIONS_ALLOW_UNSECURE_COMMANDS
        run: echo 'ACTIONS_ALLOW_UNSECURE_COMMANDS=true' >> $GITHUB_ENV

      - name: ⏳ Downloading public artifact
        uses: actions/download-artifact@v2
        with:
          name: public
          path: public

#      - uses: chrislennon/action-aws-cli@v1.1
#      - name: 📦️ Deploying to aws
#        run: aws s3 sync /home/runner/work/jandir.co/jandir.co/public s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete
#        env:
#          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
#          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
#
#      - uses: actions/checkout@master
      - uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SOURCE_DIR: '/home/runner/work/jandir.co/jandir.co/public'

      - name: 🔌 Creating invalidation
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_DISTRIBUTION_ID }} --paths "/index.html"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
